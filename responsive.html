<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>

    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header class="header">

        <div class="logo">
            TechStore
        </div>

        <div class="hamburger">
            ☰
        </div>

        <nav class="nav">

            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>

        </nav>

    </header>

    <div class="container">

        <aside class="sidebar">

            <h2>Filters</h2>

            <select>
                <option>All Products</option>
                <option>Laptop</option>
                <option>Phone</option>
                <option>Accessories</option>
            </select>

        </aside>

        <main class="product-grid">

            <div class="card">
                <img src="https://picsum.photos/300/200?1" alt="">
                <h3>Gaming Laptop</h3>
                <p>$1200</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?2" alt="">
                <h3>Wireless Headphone</h3>
                <p>$200</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?3" alt="">
                <h3>Mechanical Keyboard</h3>
                <p>$150</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?4" alt="">
                <h3>Gaming Mouse</h3>
                <p>$80</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?5" alt="">
                <h3>Smartphone</h3>
                <p>$950</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?6" alt="">
                <h3>Tablet</h3>
                <p>$650</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?7" alt="">
                <h3>Smart Watch</h3>
                <p>$300</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300/200?8" alt="">
                <h3>Camera</h3>
                <p>$890</p>
                <button>Buy Now</button>
            </div>

        </main>

        <aside class="ads">

            <h2>Advertisement</h2>

            <p>
                Big Sale 50% OFF
            </p>

        </aside>

    </div>

    <footer class="footer">

        <p>
            Responsive Product Page © 2026
        </p>

    </footer>

</body>
</html>
